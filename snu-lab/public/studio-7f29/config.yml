local_backend: true

backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: news
    label: News
    label_singular: News Post
    folder: src/content/news
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "news/{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD" }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Author, name: author, widget: string, required: false }
      - label: Tags
        name: tags
        widget: list
        required: false
        field: { label: Tag, name: tag, widget: string }
      - { label: Body, name: body, widget: markdown }

  - name: publications
    label: Publications
    files:
      - label: Publication List
        name: publication_list
        file: src/data/publications.json
        format: json
        fields:
          - label: Publications
            name: publications
            widget: list
            summary: "{{fields.year}} - {{fields.title}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Title, name: title, widget: string }
              - label: Authors
                name: authors
                widget: list
                field: { label: Author, name: author, widget: string }
              - { label: Venue, name: venue, widget: string }
              - { label: Year, name: year, widget: number, value_type: int, min: 1900, max: 2100 }
              - { label: Type, name: type, widget: string, required: false }
              - { label: DOI, name: doi, widget: string, required: false }
              - { label: Link, name: link, widget: string, required: false }
              - { label: Summary, name: summary, widget: text, required: false }
              - { label: Citation, name: citation, widget: text, required: false }
              - { label: Volume, name: volume, widget: string, required: false }
              - { label: Issue, name: issue, widget: string, required: false }
              - { label: Pages, name: pages, widget: string, required: false }
